services:
  app:
    build: .
    image: lucas42/lucos_docker_health_app
    container_name: lucos_docker_health_app
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/meminfo:/host/proc/meminfo:ro
    healthcheck:
      test: ["CMD", "/lucos_docker_health", "--healthcheck"]
      interval: 65s
      timeout: 5s
      retries: 3
    environment:
      - SYSTEM
      - HOSTDOMAIN
      - SCHEDULE_TRACKER_ENDPOINT
      - MEMORY_WARN_THRESHOLD_MB
      - SWAP_WARN_THRESHOLD_MB
